name: iOS Tests

on:
  push:
    paths:
      - 'apps/ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'apps/ios/**'

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: List available simulators
        run: xcrun simctl list devices available | grep iPhone | head -10

      - name: Resolve Swift packages
        run: |
          cd apps/ios
          xcodebuild -resolvePackageDependencies -scheme TermCastiOS

      - name: Build and test
        run: |
          cd apps/ios
          SIMULATOR=$(xcrun simctl list devices available | grep "iPhone 16 " | head -1 | grep -oE '[A-F0-9-]{36}' || xcrun simctl list devices available | grep "iPhone 15 " | head -1 | grep -oE '[A-F0-9-]{36}')
          xcodebuild test \
            -scheme TermCastiOS \
            -destination "platform=iOS Simulator,id=$SIMULATOR" \
            -enableCodeCoverage YES \
            2>&1 | grep -E "error:|TEST|BUILD" | tail -30

      - name: Fail on test failure
        run: |
          cd apps/ios
          SIMULATOR=$(xcrun simctl list devices available | grep "iPhone 16 " | head -1 | grep -oE '[A-F0-9-]{36}' || xcrun simctl list devices available | grep "iPhone 15 " | head -1 | grep -oE '[A-F0-9-]{36}')
          xcodebuild test \
            -scheme TermCastiOS \
            -destination "platform=iOS Simulator,id=$SIMULATOR" \
            2>&1 | grep -E "TEST FAILED|BUILD FAILED" && exit 1 || exit 0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: apps/ios/*.xcresult
          if-no-files-found: ignore
