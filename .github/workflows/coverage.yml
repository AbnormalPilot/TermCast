# .github/workflows/coverage.yml
name: Coverage Report

on:
  push:
    branches: [main, 'feature/**']
  workflow_dispatch:

jobs:
  ios-coverage:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve packages
        run: |
          cd apps/ios
          xcodebuild -resolvePackageDependencies -scheme TermCastiOS

      - name: Run tests with coverage
        run: |
          cd apps/ios
          SIMULATOR=$(xcrun simctl list devices available | grep "iPhone 16 " | head -1 | grep -oE '[A-F0-9-]{36}' || xcrun simctl list devices available | grep "iPhone 15 " | head -1 | grep -oE '[A-F0-9-]{36}')
          xcodebuild test \
            -scheme TermCastiOS \
            -destination "platform=iOS Simulator,id=$SIMULATOR" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult

      - name: Extract coverage summary
        run: |
          xcrun xccov view --report apps/ios/TestResults.xcresult | grep -E "\.swift" | head -30

      - name: Upload coverage bundle
        uses: actions/upload-artifact@v4
        with:
          name: ios-coverage-xcresult
          path: apps/ios/TestResults.xcresult
          if-no-files-found: ignore

  android-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/android/**/*.gradle.kts') }}

      - name: Run tests with JaCoCo
        run: |
          cd apps/android
          ./gradlew test jacocoTestReport --no-daemon 2>&1 | tail -20

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: android-coverage-report
          path: apps/android/app/build/reports/jacoco/
          if-no-files-found: ignore
