name: Android Tests

on:
  push:
    paths:
      - 'apps/android/**'
      - 'shared/cypress/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'apps/android/**'
      - 'shared/cypress/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/android/**/*.gradle.kts', 'apps/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Run unit tests
        run: |
          cd apps/android
          ./gradlew test --no-daemon 2>&1 | tail -30

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: apps/android/app/build/reports/tests/

      - name: Fail on test failure
        run: |
          cd apps/android
          ./gradlew test --no-daemon 2>&1 | grep -E "BUILD FAILED" && exit 1 || exit 0

  cypress:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shared/cypress/package-lock.json
      - name: Install Cypress
        run: cd shared/cypress && npm ci
      - name: Run Cypress tests
        run: cd shared/cypress && npx cypress run
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: shared/cypress/cypress/screenshots/

  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          script: cd apps/android && ./gradlew connectedAndroidTest
        continue-on-error: true
